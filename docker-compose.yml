services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: student
      POSTGRES_PASSWORD: student
      POSTGRES_DB: learn
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U student -d learn"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://student:student@db:5432/learn?schema=public"
    ports:
      - "3000:3000"
    command: sh -c "npx prisma migrate deploy && node server.js"

volumes:
  db_data:
